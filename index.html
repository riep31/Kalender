<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalender Indonesia 2026</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
}

h1{
  text-align:center;
}

/* ===== KONTROL ===== */
.controls{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

/* ===== TABEL KALENDER ===== */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th, td{
  width:calc(100% / 7);
}

th{
  background:#00254a;
  color:#fff;
  padding:10px;
  text-align:center;
  font-size:14px;
}

td{
  border:1px solid #ccc;
  height:115px;
  padding:6px;
  vertical-align:top;
}

.sun{
  background:#fff5f5;
  color:red;
}

.date{
  font-size:50px;
  font-weight:bold;
  float:right;
}

.pasaran{
  font-size:12px;
  margin-top:32px;
}

.libur,.cuti{
  font-size:11px;
  padding:3px 5px;
  margin-top:4px;
  border-radius:4px;
  word-wrap:break-word;
  line-height:1.3;
}

.libur{
  background:#ff6b6b;
  color:#fff;
}

.cuti{
  background:#ffa94d;
  color:#fff;
}

/* ===== CATATAN LIBUR (BUKU TULIS) ===== */
.notes{
  margin-top:40px;
}

.notes h2{
  text-align:center;
  margin-bottom:15px;
}

.note-line{
  display:flex;
  gap:15px;
  padding:8px 0;
  border-bottom:1px solid #000;
  font-size:14px;
}

.note-date{
  min-width:110px;
  font-weight:bold;
}
/* ===== PRINT STYLES ===== */
@media print {

  @page{
    size: A5 portrait;
    margin: 6mm;
  }

  body{
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* Pertebal semua garis kalender */
  td{
    border: 1.2pt solid #000 !important;
  }

  th{
    border: 1.5pt solid #000 !important;
    background:#00254a !important;
    color:#fff !important;
  }

  /* Garis catatan buku tulis */
  .note-line{
    border-bottom: 1.4pt solid #000 !important;
  }

  /* Matikan kontrol */
  .controls{
    display:none;
  }

  /* Kunci tinggi sel agar stabil */
  td{
    height: 95px;
  }

}
</style>
</head>

<body>

<h1>Kalender Indonesia 2026</h1>

<div class="controls">
  <select id="monthSelect"></select>
  <button onclick="window.print()">🖨 Cetak</button>
</div>

<table>
<thead>
<tr>
  <th>Senin</th>
  <th>Selasa</th>
  <th>Rabu</th>
  <th>Kamis</th>
  <th>Jumat</th>
  <th>Sabtu</th>
  <th>Minggu</th>
</tr>
</thead>
<tbody id="calendarBody"></tbody>
</table>

<div class="notes">
  <h2 id="noteTitle">Catatan Libur</h2>
  <div id="noteBody"></div>
</div>

<script>
// ===== DATA =====
const hariLibur2026 = [
 {date:'2026-01-01',title:'Tahun Baru 2026 Masehi',type:'libur'},
 {date:'2026-01-16',title:'Isra Mikraj Nabi Muhammad SAW',type:'libur'},
 {date:'2026-02-17',title:'Tahun Baru Imlek 2577 Kongzili',type:'libur'},
 {date:'2026-03-19',title:'Hari Suci Nyepi (Tahun Baru Saka 1948)',type:'libur'},
 {date:'2026-03-21',title:'Hari Raya Idul Fitri 1447 H',type:'libur'},
 {date:'2026-03-22',title:'Hari Raya Idul Fitri 1447 H',type:'libur'},
 {date:'2026-04-03',title:'Wafat Yesus Kristus',type:'libur'},
 {date:'2026-04-05',title:'Paskah',type:'libur'},
 {date:'2026-05-01',title:'Hari Buruh Internasional',type:'libur'},
 {date:'2026-05-14',title:'Kenaikan Yesus Kristus',type:'libur'},
 {date:'2026-05-27',title:'Hari Raya Idul Adha 1447 H',type:'libur'},
 {date:'2026-05-31',title:'Hari Raya Waisak 2570 BE',type:'libur'},
 {date:'2026-06-01',title:'Hari Lahir Pancasila',type:'libur'},
 {date:'2026-06-16',title:'Tahun Baru Islam 1448 H',type:'libur'},
 {date:'2026-08-17',title:'Hari Kemerdekaan RI',type:'libur'},
 {date:'2026-08-25',title:'Maulid Nabi Muhammad SAW',type:'libur'},
 {date:'2026-12-25',title:'Hari Raya Natal',type:'libur'}
];

const cutiBersama2026 = [
 {date:'2026-02-16',title:'Cuti Bersama Tahun Baru Imlek',type:'cuti'},
 {date:'2026-03-18',title:'Cuti Bersama Hari Suci Nyepi',type:'cuti'},
 {date:'2026-03-20',title:'Cuti Bersama Idul Fitri',type:'cuti'},
 {date:'2026-03-23',title:'Cuti Bersama Idul Fitri',type:'cuti'},
 {date:'2026-03-24',title:'Cuti Bersama Idul Fitri',type:'cuti'},
 {date:'2026-05-15',title:'Cuti Bersama Kenaikan Yesus Kristus',type:'cuti'},
 {date:'2026-05-28',title:'Cuti Bersama Idul Adha',type:'cuti'},
 {date:'2026-12-24',title:'Cuti Bersama Natal',type:'cuti'}
];

const allEvents=[...hariLibur2026,...cutiBersama2026];

// ===== PASARAN ===== (DIPERBAIKI: 1 Januari 2026 = Pon)
function pasaran(y, m, d){
 const p=['Pon','Wage','Kliwon','Legi','Pahing'];
 const date = new Date(y, m, d);
 const ref = new Date(2026, 0, 1); // 1 Jan 2026 = Pon (index 0)
 const diff = Math.floor((date - ref) / 86400000);
 return p[diff % 5];
}

const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const select=document.getElementById("monthSelect");
months.forEach((m,i)=>select.innerHTML+=`<option value="${i}">${m} 2026</option>`);

function fmt(date){
 const d=new Date(date);
 return String(d.getDate()).padStart(2,'0')+'-'+
        String(d.getMonth()+1).padStart(2,'0')+'-'+
        d.getFullYear();
}

function render(m){
 const body=document.getElementById("calendarBody");
 const note=document.getElementById("noteBody");
 document.getElementById("noteTitle").innerText=`Catatan Libur ${months[m]} 2026`;
 body.innerHTML=""; note.innerHTML="";

 const first=new Date(2026,m,1);
 const days=new Date(2026,m+1,0).getDate();
 let start=(first.getDay()+6)%7;
 let tr=document.createElement("tr");

 for(let i=0;i<start;i++) tr.innerHTML+="<td></td>";

 let events=[];
 for(let d=1;d<=days;d++){
  const date=new Date(2026,m,d);
  // Format ISO tanpa timezone issue
  const iso = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const ev=allEvents.filter(e=>e.date===iso);
  if(ev.length) events.push(...ev);

  const td=document.createElement("td");
  // DIPERBAIKI: Deteksi Minggu berdasarkan posisi kolom, bukan getDay()
  if((start+d)%7===0) td.classList.add("sun");
  td.innerHTML=`<div class="date">${d}</div>
                <div class="pasaran">${pasaran(2026, m, d)}</div>`;
  ev.forEach(e=>td.innerHTML+=`<div class="${e.type}">${e.title}</div>`);
  tr.appendChild(td);

  if((start+d)%7===0){body.appendChild(tr);tr=document.createElement("tr");}
 }
 body.appendChild(tr);

 events.sort((a,b)=>new Date(a.date)-new Date(b.date));
 events.forEach(e=>{
  note.innerHTML+=`
   <div class="note-line">
     <div class="note-date">${fmt(e.date)}</div>
     <div>${e.title}</div>
   </div>`;
 });
}

select.onchange=()=>render(+select.value);
render(0);
</script>

</body>
</html>
